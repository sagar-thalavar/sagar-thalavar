name: Daily Streak

on:
  schedule:
    - cron: '0 3 * * *'   # base trigger at 03:00 UTC; actual commits land at random times via sleep
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Random delay (spreads commits across the day, skipped on manual trigger)
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 57600))   # up to 16 hours of random offset

      - name: Make 1–5 random commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          count=$((RANDOM % 5 + 1))
          echo "Making $count commit(s) today"

          for i in $(seq 1 $count); do
            sleep $((RANDOM % 300))   # 0–5 min gap between commits
            echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> STREAK.md
            git add STREAK.md
            git commit -m "chore: daily log $(date -u '+%Y-%m-%d %H:%M')"
          done

          git push
